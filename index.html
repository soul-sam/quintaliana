<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0B0B0B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Rodízio Murchas</title>
<style>
/* ============================================
   BOCAS MURCHAS — GAMER UNDERGROUND THEME
   Self-contained · mobile · live (Firebase)
   ============================================ */
:root{
  --bg:#0B0B0B; --bg-card:#0F0F0F; --fg:#EAEAEA; --muted:#8A8A8A;
  --acid:#6AFF00; --acid-dark:#3A5F0B; --slime-dark:#4CAF00; --slime-light:#8FFF40;
  --burn:#F2B705; --burn-dark:#D4A005; --blood:#C2341D;
  --border:#1f1f1f; --line:#262626;
  --radius:4px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;border-color:var(--border)}
html{scroll-behavior:smooth;height:100%}
body{
  margin:0;min-height:100%;color:var(--fg);
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  background-color:#0B0B0B;
  background-image:
    radial-gradient(ellipse at top, rgba(106,255,0,0.05) 0%, transparent 55%),
    linear-gradient(rgba(106,255,0,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(106,255,0,0.025) 1px, transparent 1px);
  background-size:100% 100%, 46px 46px, 46px 46px;
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
  padding-bottom:env(safe-area-inset-bottom);
}
.mono{font-family:ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:rgba(106,255,0,.3);color:#EAEAEA}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:#0B0B0B}
::-webkit-scrollbar-thumb{background:var(--acid-dark);border-radius:4px}

.title-acid{
  font-weight:900;text-transform:uppercase;letter-spacing:.02em;
  background:linear-gradient(135deg,#6AFF00 0%,#F2B705 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 10px rgba(106,255,0,.4));
}
.text-acid{color:var(--acid)} .text-burn{color:var(--burn)} .text-muted{color:var(--muted)}

.app{max-width:560px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column}
.screen.active{display:flex}

/* top bar */
.topbar{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  background:rgba(11,11,11,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
}
.brand{display:flex;flex-direction:column;line-height:1}
.brand b{font-size:18px;font-weight:900;letter-spacing:.01em}
.brand small{font-size:9.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--acid);margin-top:3px;display:flex;align-items:center;gap:5px}
.spacer{flex:1}
.live-dot{width:7px;height:7px;border-radius:50%;background:#444;flex:none}
.live-dot.on{background:var(--acid);box-shadow:0 0 8px var(--acid);animation:pulse 1.6s ease-in-out infinite}
.live-dot.local{background:var(--burn);box-shadow:0 0 6px var(--burn)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.who{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 5px;border:1px solid var(--acid-dark);border-radius:999px;background:rgba(106,255,0,.05)}
.who .av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:15px;background:#000;border:1px solid var(--acid-dark)}
.who b{font-size:13px;max-width:84px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.iconbtn{width:38px;height:38px;border-radius:var(--radius);display:grid;place-items:center;border:1px solid var(--border);background:var(--bg-card);font-size:18px}
.iconbtn:active{transform:scale(.94)}

.btn-acid{font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:14px;padding:14px 18px;border-radius:var(--radius);background:linear-gradient(135deg,#6AFF00 0%,#4CAF00 100%);color:#0B0B0B;border:2px solid #8FFF40;box-shadow:4px 4px 0 0 var(--acid-dark),0 0 15px rgba(106,255,0,.25);transition:transform .08s,box-shadow .08s;width:100%}
.btn-acid:active{transform:translate(2px,2px);box-shadow:2px 2px 0 0 var(--acid-dark)}

.input{width:100%;background:#0B0B0B;border:2px solid var(--line);color:#EAEAEA;border-radius:var(--radius);padding:14px;font-size:16px;font-family:ui-monospace,monospace;transition:border-color .15s,box-shadow .15s}
.input:focus{border-color:var(--acid);box-shadow:0 0 0 2px rgba(106,255,0,.18);outline:none}
.input::placeholder{color:#444}

/* LOGIN */
.login-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:22px 18px;gap:18px}
.hero{text-align:center}
.hero .logo{font-size:46px;letter-spacing:-.03em}
.hero .sub{margin-top:8px;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted)}
.hero .resto{margin-top:16px;display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--burn);border:1px solid var(--burn-dark);border-radius:999px;padding:6px 14px;background:rgba(242,183,5,.06)}
.section-label{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}

.mesa-box{border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;background:rgba(15,15,15,.5)}
.mesa-row{display:flex;gap:8px;align-items:center}
.mesa-row .input{flex:1;text-transform:lowercase}
.mesa-row .join{flex:none;padding:0 16px;height:50px;border-radius:var(--radius);border:2px solid var(--acid-dark);background:rgba(106,255,0,.08);color:var(--acid);font-weight:800;text-transform:uppercase;font-size:12px;letter-spacing:.06em}
.mesa-row .join:active{transform:scale(.97)}
.mesa-hint{font-size:10.5px;color:var(--muted);margin-top:8px;line-height:1.4}

.players{display:flex;flex-direction:column;gap:8px}
.player-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:linear-gradient(135deg,#0F0F0F,#0B0B0B);border:1px solid var(--line);border-radius:var(--radius);box-shadow:3px 3px 0 0 rgba(106,255,0,.08);transition:transform .08s,box-shadow .12s;text-align:left}
.player-card:active{transform:translate(2px,2px);box-shadow:1px 1px 0 0 rgba(106,255,0,.08)}
.player-card .av{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-size:22px;background:#000;border:1px solid var(--acid-dark);flex:none}
.player-card .pmeta{flex:1;min-width:0}
.player-card .pmeta b{display:block;font-size:16px;font-weight:800}
.player-card .pmeta span{font-size:11px;color:var(--muted)}
.player-card .go{color:var(--acid);font-size:20px}
.player-card .del{color:#4a4a4a;font-size:13px;padding:8px;margin:-8px}
.player-card .del:active{color:#ff7a6b}

.new-box{border:1px dashed var(--acid-dark);border-radius:var(--radius);padding:14px;background:rgba(106,255,0,.02)}
.emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
.emoji-pick{width:40px;height:40px;border-radius:var(--radius);font-size:20px;display:grid;place-items:center;border:1px solid var(--line);background:#0B0B0B}
.emoji-pick.sel{border-color:var(--acid);background:rgba(106,255,0,.12);box-shadow:0 0 10px rgba(106,255,0,.2)}

/* MENU */
.menu{flex:1;overflow-y:auto;padding:8px 14px 140px}
.cat{margin-top:18px}
.cat-head{display:flex;align-items:center;gap:10px;margin:0 2px 10px}
.cat-head .ico{font-size:18px}
.cat-head h2{margin:0;font-size:13px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--acid)}
.cat-head .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--acid-dark),transparent)}
.cat-head .cc{font-size:11px;color:var(--muted)}
.cat-head .cc b{color:var(--burn)}

.item{display:flex;align-items:center;gap:12px;padding:10px 12px;margin-bottom:8px;background:linear-gradient(135deg,#0F0F0F,#0B0B0B);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .12s,box-shadow .12s}
.item.has{border-color:var(--acid-dark);box-shadow:inset 0 0 22px rgba(106,255,0,.05),3px 3px 0 0 rgba(106,255,0,.07)}
.item .info{flex:1;min-width:0}
.item .info b{font-size:15px;font-weight:700;display:block;line-height:1.2}
.item .info p{margin:3px 0 0;font-size:11px;line-height:1.35;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.stepper{display:flex;align-items:center;flex:none}
.step{width:40px;height:40px;display:grid;place-items:center;font-size:22px;font-weight:800;border:1px solid var(--line);background:#0B0B0B}
.step.minus{border-radius:var(--radius) 0 0 var(--radius);color:#ff7a6b}
.step.plus{border-radius:0 var(--radius) var(--radius) 0;color:#0B0B0B;background:linear-gradient(135deg,#6AFF00,#4CAF00);border-color:#8FFF40}
.step.plus:active,.step.minus:active{transform:scale(.9)}
.step:disabled{opacity:.32}
.qty{min-width:42px;height:40px;display:grid;place-items:center;font-weight:900;font-size:17px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:#000;font-family:ui-monospace,monospace}
.qty.on{color:var(--acid);text-shadow:0 0 10px rgba(106,255,0,.7)}

.dock{position:fixed;left:0;right:0;bottom:0;z-index:25;max-width:560px;margin:0 auto;padding:12px 14px calc(env(safe-area-inset-bottom) + 12px);background:linear-gradient(0deg,#0B0B0B 70%,transparent);display:flex;gap:10px;align-items:center}
.tot{flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:74px;padding:8px 10px;border:2px solid var(--acid-dark);border-radius:var(--radius);background:rgba(11,11,11,.9);box-shadow:0 0 16px rgba(106,255,0,.12)}
.tot b{font-size:24px;font-weight:900;color:var(--acid);font-family:ui-monospace,monospace;line-height:1;text-shadow:0 0 12px rgba(106,255,0,.6)}
.tot small{font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:3px}

/* PLACAR */
.placar{flex:1;overflow-y:auto;padding:8px 14px 40px}
.rank{display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:8px;border-radius:var(--radius);background:linear-gradient(135deg,#0F0F0F,#0B0B0B);border:1px solid var(--line)}
.rank.gold{border-color:var(--burn);box-shadow:0 0 18px rgba(242,183,5,.18)}
.rank .pos{font-size:22px;width:34px;text-align:center;flex:none;font-weight:900;font-family:ui-monospace,monospace;color:var(--muted)}
.rank .av{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:21px;background:#000;border:1px solid var(--acid-dark);flex:none}
.rank .rmeta{flex:1;min-width:0}
.rank .rmeta b{display:block;font-size:16px;font-weight:800}
.rank .rmeta span{font-size:11px;color:var(--muted)}
.rank .rbig{font-size:28px;font-weight:900;font-family:ui-monospace,monospace;color:var(--acid);text-shadow:0 0 12px rgba(106,255,0,.5);text-align:right}
.rank .rbig small{display:block;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.detail{margin-top:8px;border-top:1px dashed var(--line);padding-top:8px;display:none}
.detail.open{display:block}
.detail .drow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:#cfcfcf}
.detail .drow span:last-child{color:var(--burn);font-family:ui-monospace,monospace;font-weight:700}

.panel{margin-top:18px;border:1px solid var(--line);border-radius:var(--radius);background:rgba(15,15,15,.6);padding:14px}
.panel h3{margin:0 0 10px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--acid)}
.trow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 0;border-bottom:1px solid #161616}
.trow:last-child{border-bottom:none}
.trow .tq{font-family:ui-monospace,monospace;font-weight:800;color:var(--burn)}
.bar{height:5px;border-radius:3px;background:linear-gradient(90deg,#6AFF00,#F2B705);margin-top:4px;box-shadow:0 0 8px rgba(106,255,0,.3)}
.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:13px}
.empty .big{font-size:40px;margin-bottom:10px}
.foot{text-align:center;padding:24px 16px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#3a3a3a;line-height:1.7}

.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:#0B0B0B;border:1px solid var(--acid);color:var(--acid);padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;box-shadow:0 0 20px rgba(106,255,0,.3);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);z-index:40;opacity:0;pointer-events:none;transition:opacity .2s}
.backdrop.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:560px;margin:0 auto;background:#0F0F0F;border-top:2px solid var(--acid-dark);border-radius:12px 12px 0 0;padding:10px 16px calc(env(safe-area-inset-bottom) + 18px);transform:translateY(110%);transition:transform .25s cubic-bezier(.2,.9,.3,1)}
.sheet.show{transform:translateY(0)}
.sheet .grab{width:42px;height:4px;border-radius:3px;background:#333;margin:6px auto 12px}
.sheet .mesa-tag{text-align:center;font-size:11px;color:var(--muted);margin-bottom:12px}
.sheet .mesa-tag b{color:var(--acid);font-family:ui-monospace,monospace}
.sheet button{width:100%;text-align:left;padding:15px 14px;border-radius:var(--radius);font-size:15px;font-weight:600;display:flex;align-items:center;gap:12px;margin-bottom:6px;border:1px solid var(--line);background:#0B0B0B}
.sheet button .e{font-size:18px}
.sheet button:active{border-color:var(--acid)}
</style>
</head>
<body>
<div class="app">

  <!-- ============ LOGIN ============ -->
  <section id="screen-login" class="screen active">
    <div class="login-wrap">
      <div class="hero">
        <div class="logo title-acid">Rodízio Murchas</div>
        <div class="sub">Bocas Murchas</div>
        <div class="resto">🍝 Quintaliana · Casa Mia</div>
      </div>

      <div class="mesa-box" id="mesa-box">
        <p class="section-label" style="margin-bottom:8px">Mesa (todos na mesma mesa veem o placar ao vivo)</p>
        <div class="mesa-row">
          <input id="mesa-input" class="input" placeholder="nome-da-mesa" maxlength="24" autocomplete="off" />
          <button class="join" id="mesa-join">Entrar</button>
        </div>
        <p class="mesa-hint" id="mesa-status">Conectando…</p>
      </div>

      <div id="players-block" style="display:none">
        <p class="section-label">Quem é você?</p>
        <div id="players" class="players"></div>
      </div>

      <div class="new-box">
        <p class="section-label" style="margin-bottom:6px">Novo jogador nesta mesa</p>
        <input id="new-name" class="input" placeholder="seu nome..." maxlength="18" autocomplete="off" />
        <div class="emoji-row" id="emoji-row"></div>
        <button class="btn-acid" id="create-btn">Entrar no rodízio →</button>
      </div>
    </div>
    <div class="foot" id="login-foot">Bocas Murchas</div>
  </section>

  <!-- ============ MENU ============ -->
  <section id="screen-menu" class="screen">
    <header class="topbar">
      <div class="brand"><b class="text-acid">RODÍZIO MURCHAS</b><small><span class="live-dot" id="dot-menu"></span><span id="mode-menu">mesa</span></small></div>
      <div class="spacer"></div>
      <button class="who" id="who-btn"><span class="av" id="who-av">🙂</span><b id="who-name">você</b></button>
      <button class="iconbtn" id="open-sheet">⋯</button>
    </header>
    <div class="menu" id="menu"></div>
    <div class="dock">
      <div class="tot"><b id="dock-total">0</b><small>seus itens</small></div>
      <button class="btn-acid" id="placar-btn" style="margin:0">🏆 Ver placar</button>
    </div>
  </section>

  <!-- ============ PLACAR ============ -->
  <section id="screen-placar" class="screen">
    <header class="topbar">
      <button class="iconbtn" id="back-btn">←</button>
      <div class="brand" style="margin-left:4px"><b class="text-burn">PLACAR</b><small><span class="live-dot" id="dot-placar"></span>ao vivo</small></div>
      <div class="spacer"></div>
      <a class="iconbtn" id="report-btn" href="./relatorio.html" style="text-decoration:none">📊</a>
      <button class="iconbtn" id="share-btn">📋</button>
    </header>
    <div class="placar" id="placar"></div>
  </section>

</div>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div class="mesa-tag">Mesa: <b id="sheet-mesa">—</b></div>
  <a href="./relatorio.html" style="text-decoration:none;color:inherit"><button style="width:100%"><span class="e">📊</span> Ver relatório final</button></a>
  <button id="act-switch"><span class="e">🔄</span> Trocar de jogador / mesa</button>
  <button id="act-reset-me"><span class="e">♻️</span> Zerar minha conta</button>
  <button id="act-reset-all" style="color:#ff7a6b;border-color:#5a1c16;background:rgba(194,52,29,.08)"><span class="e">🗑️</span> Zerar a mesa toda</button>
</div>
<div class="toast" id="toast"></div>

<!-- Firebase (live sync). Carrega via CDN; se falhar, app cai pro modo local. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  ]},
  { cat:"Pizzas doces", ico:"🍫", items:[
    { id:"pzd_cartola", n:"Cartola", d:"Mussarela, rapadura, banana e canela." },
    { id:"pzd_floresta", n:"Floresta negra", d:"Banana e ganache de chocolate meio amargo." },
  ]},
  { cat:"Sobremesa", ico:"🍰", items:[
    { id:"sb_bolo", n:"Bolo amanteigado de cacau", d:"Com calda quente de chocolate e café. Gostinho de casa de vó." },
  ]},
];
const ITEM_BY_ID = {}; MENU.forEach(c=>c.items.forEach(i=>ITEM_BY_ID[i.id]=i));
const EMOJIS = ["🍝","🍕","🤤","🐷","🦖","👑","🔥","💀","🤓","😈","🥵","🧀","🍷","⚡","🦄","🍄"];

/* ---------- backend mode ---------- */
const LIVE = (function(){
  try{
    if(typeof firebase==="undefined") return false;
    if(String(FIREBASE_CONFIG.databaseURL).indexOf("COLE_AQUI")>=0) return false;
    firebase.initializeApp(FIREBASE_CONFIG);
    return true;
  }catch(e){ console.warn("Firebase off:",e); return false; }
})();

const LKEY = "quintaliana_v2";
const IDKEY = "quintaliana_id";

let state = { users:[], counts:{} };   // users:[{id,name,emoji,o}], counts:{uid:{itemId:qty}}
let me = null;
let room = null;
let roomRef = null;

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
function show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); $("#"+id).classList.add("active"); window.scrollTo(0,0); }
function counts(uid){ return state.counts[uid] || {}; }
function userTotal(uid){ const c=counts(uid); return Object.values(c).reduce((a,b)=>a+(+b||0),0); }
function vibrate(ms){ if(navigator.vibrate) try{navigator.vibrate(ms)}catch(e){} }
let toastT; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1600); }
function nowO(){ return Date.now(); }
function ident(){ try{ return JSON.parse(localStorage.getItem(IDKEY))||{}; }catch(e){ return {}; } }
function setIdent(o){ localStorage.setItem(IDKEY, JSON.stringify(o)); }

/* ---------- LOCAL persistence ---------- */
function loadLocal(){ try{ const v=JSON.parse(localStorage.getItem(LKEY)); if(v&&v.users){ normalize(v); } }catch(e){} }
function saveLocal(){ localStorage.setItem(LKEY, JSON.stringify({ users: state.users, counts: state.counts })); }

/* normalize raw {users,counts} (objects or arrays) into state */
function normalize(raw){
  raw = raw || {};
  let us = raw.users || {};
  if(Array.isArray(us)) us = us.filter(Boolean);
  else us = Object.keys(us).map(id=>({ id, name:us[id].name, emoji:us[id].emoji, o:us[id].o||0 }));
  us.sort((a,b)=>(a.o||0)-(b.o||0));
  const cs = {};
  const rc = raw.counts || {};
  Object.keys(rc).forEach(uid=>{ const m={}; const obj=rc[uid]||{}; Object.keys(obj).forEach(k=>{ if(+obj[k]>0) m[k]=+obj[k]; }); cs[uid]=m; });
  state.users = us; state.counts = cs;
}

/* ---------- writes (abstracted) ---------- */
function writeUser(u){
  if(LIVE){ roomRef.child("users/"+u.id).set({ name:u.name, emoji:u.emoji, o:u.o }); }
  else { state.users.push(u); state.counts[u.id]=state.counts[u.id]||{}; saveLocal(); }
}
function writeCount(uid, itemId, qty){
  if(LIVE){ roomRef.child("counts/"+uid+"/"+itemId).set(qty>0?qty:null); }
  else { const c=state.counts[uid]||(state.counts[uid]={}); if(qty>0) c[itemId]=qty; else delete c[itemId]; saveLocal(); }
}
function removeUser(uid){
  if(LIVE){ roomRef.child("users/"+uid).remove(); roomRef.child("counts/"+uid).remove(); }
  else { state.users=state.users.filter(u=>u.id!==uid); delete state.counts[uid]; saveLocal(); }
}
function resetUser(uid){ if(LIVE){ roomRef.child("counts/"+uid).remove(); } else { state.counts[uid]={}; saveLocal(); } }
function resetAll(){ if(LIVE){ roomRef.child("counts").remove(); } else { state.users.forEach(u=>state.counts[u.id]={}); saveLocal(); } }

/* ---------- room (live) ---------- */
let pendingAutoUser = null;
function joinRoom(code){
  code = (code||"").trim().toLowerCase().replace(/[^a-z0-9_-]/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"") || "quintaliana";
  room = code;
  $("#mesa-input").value = room;
  $("#sheet-mesa").textContent = room;
  setIdent(Object.assign(ident(), { room }));
  if(!LIVE){ renderPlayers(); return; }
  if(roomRef) roomRef.off();
  roomRef = firebase.database().ref("rooms/"+room);
  roomRef.on("value", snap=>{
    normalize(snap.val()||{});
    onData();
  }, err=>{ $("#mesa-status").textContent="⚠ Erro ao conectar — confira as regras do banco."; });
  $("#mesa-status").textContent = "Conectado à mesa “"+room+"”. Toque no seu nome ou crie um jogador.";
}
function onData(){
  // auto re-enter saved user after first snapshot
  if(pendingAutoUser){ const id=pendingAutoUser; pendingAutoUser=null; if(state.users.some(u=>u.id===id)){ enter(id); } }
  // keep current screen fresh
  const active = document.querySelector(".screen.active");
  if(active && active.id==="screen-login") renderPlayers();
  if(active && active.id==="screen-menu" && me){ if(!state.users.some(u=>u.id===me)){ /* I was removed */ show("screen-login"); renderPlayers(); return; } renderMenu(); updateDock(); }
  if(active && active.id==="screen-placar") renderPlacar();
}

/* ---------- login UI ---------- */
let pickedEmoji = EMOJIS[0];
function renderEmojis(){
  const row=$("#emoji-row"); row.innerHTML="";
  EMOJIS.forEach(e=>{ const b=document.createElement("button"); b.className="emoji-pick"+(e===pickedEmoji?" sel":""); b.textContent=e; b.onclick=()=>{pickedEmoji=e;renderEmojis();}; row.appendChild(b); });
}
function renderPlayers(){
  const block=$("#players-block"), list=$("#players");
  if(!state.users.length){ block.style.display="none"; return; }
  block.style.display="block"; list.innerHTML="";
  state.users.forEach(u=>{
    const card=document.createElement("button"); card.className="player-card";
    card.innerHTML=`<span class="av">${u.emoji}</span><span class="pmeta"><b></b><span>${userTotal(u.id)} itens</span></span><span class="del">✕</span><span class="go">→</span>`;
    card.querySelector("b").textContent=u.name;
    card.onclick=ev=>{ if(ev.target.classList.contains("del")) return; enter(u.id); };
    card.querySelector(".del").onclick=ev=>{ ev.stopPropagation(); const u2=state.users.find(x=>x.id===u.id); if(u2&&confirm(`Remover ${u2.name} e sua contagem?`)){ removeUser(u.id); renderPlayers(); } };
    list.appendChild(card);
  });
}
function createUser(){
  const name=$("#new-name").value.trim();
  if(!name){ toast("Digite seu nome"); $("#new-name").focus(); return; }
  if(state.users.some(u=>u.name.toLowerCase()===name.toLowerCase())){
    if(confirm("Já existe \""+name+"\" nesta mesa. É você? Toque OK pra entrar nele.")){ enter(state.users.find(u=>u.name.toLowerCase()===name.toLowerCase()).id); return; }
    return;
  }
  const u={ id:"u"+Math.random().toString(36).slice(2,9), name, emoji:pickedEmoji, o:nowO() };
  writeUser(u);
  $("#new-name").value=""; vibrate(20); enter(u.id);
}

/* ---------- enter app ---------- */
function enter(id){
  me=id; const u=state.users.find(x=>x.id===id); if(!u) return;
  setIdent(Object.assign(ident(), { room, userId:id }));
  $("#who-name").textContent=u.name; $("#who-av").textContent=u.emoji;
  setMode(); renderMenu(); updateDock(); show("screen-menu");
}
function setMode(){
  const dot1=$("#dot-menu"), dot2=$("#dot-placar"), label=$("#mode-menu");
  if(LIVE){ dot1.className="live-dot on"; dot2.className="live-dot on"; label.textContent="mesa "+room; }
  else { dot1.className="live-dot local"; dot2.className="live-dot local"; label.textContent="modo local"; }
}

/* ---------- menu ---------- */
function renderMenu(){
  const wrap=$("#menu"); wrap.innerHTML="";
  const c=counts(me);
  MENU.forEach(group=>{
    const sub=group.items.reduce((a,i)=>a+(c[i.id]||0),0);
    const sec=document.createElement("div"); sec.className="cat";
    sec.innerHTML=`<div class="cat-head"><span class="ico">${group.ico}</span><h2>${group.cat}</h2><span class="ln"></span><span class="cc"><b>${sub}</b></span></div>`;
    group.items.forEach(it=>{
      const q=c[it.id]||0;
      const row=document.createElement("div"); row.className="item"+(q>0?" has":"");
      row.innerHTML=`<div class="info"><b></b><p></p></div><div class="stepper"><button class="step minus" ${q===0?"disabled":""}>−</button><div class="qty ${q>0?"on":""}">${q}</div><button class="step plus">+</button></div>`;
      row.querySelector("b").textContent=it.n; row.querySelector("p").textContent=it.d;
      row.querySelector(".plus").onclick=()=>change(it.id,1);
      row.querySelector(".minus").onclick=()=>change(it.id,-1);
      sec.appendChild(row);
    });
    wrap.appendChild(sec);
  });
}
function change(itemId,delta){
  const c=state.counts[me]||(state.counts[me]={});
  const next=Math.max(0,(c[itemId]||0)+delta);
  if(next>0) c[itemId]=next; else delete c[itemId];   // optimistic
  writeCount(me,itemId,next);
  vibrate(delta>0?18:10); renderMenu(); updateDock();
}
function updateDock(){ $("#dock-total").textContent=userTotal(me); }

/* ---------- placar ---------- */
function renderPlacar(){
  const wrap=$("#placar"); wrap.innerHTML="";
  const ranked=[...state.users].map(u=>({u,t:userTotal(u.id)})).sort((a,b)=>b.t-a.t);
  const grand=ranked.reduce((a,r)=>a+r.t,0);
  if(grand===0){ wrap.innerHTML=`<div class="empty"><div class="big">🍽️</div>Ninguém comeu nada ainda.<br>Bora pro rodízio!</div>`; return; }
  const medals=["🥇","🥈","🥉"];
  ranked.forEach((r,idx)=>{
    if(r.t===0) return;
    const c=counts(r.u.id);
    const bd=Object.entries(c).sort((a,b)=>b[1]-a[1]).map(([id,q])=>`<div class="drow"><span>${ITEM_BY_ID[id]?ITEM_BY_ID[id].n:id}</span><span>${q}×</span></div>`).join("");
    const card=document.createElement("div"); card.className="rank"+(idx===0?" gold":"");
    card.innerHTML=`<div class="pos">${medals[idx]||(idx+1)}</div><div class="av">${r.u.emoji}</div><div class="rmeta"><b></b><span>toque p/ detalhar</span><div class="detail">${bd}</div></div><div class="rbig">${r.t}<small>itens</small></div>`;
    card.querySelector(".rmeta b").textContent=r.u.name;
    card.onclick=()=>card.querySelector(".detail").classList.toggle("open");
    wrap.appendChild(card);
  });
  const tot=document.createElement("div"); tot.className="panel";
  tot.innerHTML=`<h3>Total da mesa</h3><div class="trow"><span>Itens consumidos</span><span class="tq">${grand}</span></div><div class="trow"><span>Pessoas comendo</span><span class="tq">${ranked.filter(r=>r.t>0).length}</span></div>`;
  wrap.appendChild(tot);
  const agg={}; state.users.forEach(u=>{ const c=counts(u.id); for(const id in c) agg[id]=(agg[id]||0)+c[id]; });
  const items=Object.entries(agg).sort((a,b)=>b[1]-a[1]);
  if(items.length){
    const max=items[0][1]; const p=document.createElement("div"); p.className="panel";
    p.innerHTML=`<h3>🔥 Mais devorados</h3>`+items.map(([id,q])=>`<div class="trow" style="flex-direction:column;align-items:stretch;border-bottom:none;padding:7px 0"><div style="display:flex;justify-content:space-between"><span>${ITEM_BY_ID[id]?ITEM_BY_ID[id].n:id}</span><span class="tq">${q}×</span></div><div class="bar" style="width:${Math.round(q/max*100)}%"></div></div>`).join("");
    wrap.appendChild(p);
  }
}

/* ---------- share ---------- */
function shareText(){
  const ranked=[...state.users].map(u=>({u,t:userTotal(u.id)})).filter(r=>r.t>0).sort((a,b)=>b.t-a.t);
  if(!ranked.length) return "Ninguém comeu nada ainda 😅";
  let s="🍝 RODÍZIO MURCHAS — Placar"+(LIVE?" (mesa "+room+")":"")+"\n\n";
  const medals=["🥇","🥈","🥉"];
  ranked.forEach((r,i)=>{ s+=`${medals[i]||(i+1)+"."} ${r.u.emoji} ${r.u.name} — ${r.t} itens\n`; });
  s+=`\nTotal da mesa: ${ranked.reduce((a,r)=>a+r.t,0)} itens 🔥`;
  return s;
}
async function doShare(){
  const txt=shareText();
  if(navigator.share){ try{ await navigator.share({title:"Placar Rodízio Murchas",text:txt}); return; }catch(e){} }
  try{ await navigator.clipboard.writeText(txt); toast("Placar copiado ✓"); }catch(e){ alert(txt); }
}

/* ---------- sheet ---------- */
function openSheet(){ $("#sheet").classList.add("show"); $("#backdrop").classList.add("show"); }
function closeSheet(){ $("#sheet").classList.remove("show"); $("#backdrop").classList.remove("show"); }

/* ---------- wire ---------- */
$("#create-btn").onclick=createUser;
$("#new-name").addEventListener("keydown",e=>{ if(e.key==="Enter") createUser(); });
$("#mesa-join").onclick=()=>joinRoom($("#mesa-input").value);
$("#mesa-input").addEventListener("keydown",e=>{ if(e.key==="Enter") joinRoom($("#mesa-input").value); });
$("#placar-btn").onclick=()=>{ renderPlacar(); show("screen-placar"); };
$("#back-btn").onclick=()=>show("screen-menu");
$("#share-btn").onclick=doShare;
$("#who-btn").onclick=openSheet;
$("#open-sheet").onclick=openSheet;
$("#backdrop").onclick=closeSheet;
$("#act-switch").onclick=()=>{ closeSheet(); renderPlayers(); show("screen-login"); };
$("#act-reset-me").onclick=()=>{ closeSheet(); if(confirm("Zerar toda a sua contagem?")){ resetUser(me); renderMenu(); updateDock(); toast("Sua conta foi zerada"); } };
$("#act-reset-all").onclick=()=>{ closeSheet(); if(confirm("Apagar a contagem de TODOS da mesa?")){ resetAll(); renderMenu(); updateDock(); toast("Mesa zerada"); } };

/* ---------- boot ---------- */
renderEmojis();
if(!LIVE){
  $("#mesa-box").style.display="none";
  $("#login-foot").innerHTML="Bocas Murchas · modo local (dados só neste aparelho)";
  loadLocal();
  renderPlayers();
  const id=ident().userId; if(id && state.users.some(u=>u.id===id)) enter(id);
} else {
  $("#login-foot").innerHTML="Bocas Murchas · placar ao vivo 🟢";
  const saved=ident();
  pendingAutoUser = saved.userId || null;
  joinRoom(saved.room || "quintaliana");
}
</script>
